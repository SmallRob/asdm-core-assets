name: ASDM Workspace Execution

on:
  workflow_dispatch:
    inputs:
      prompt-text:
        description: 'Prompt text for CodeBuddy'
        required: true
        default: ''
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: true
        type: boolean
      output-format:
        description: 'Output format'
        required: false
        default: 'stream-json'
        type: choice
        options:
          - stream-json
          - json
          - text

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:
  execute-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CodeBuddy
        run: |
          npm install -g @tencent-ai/codebuddy-code
          codebuddy --version

      - name: Execute task with CodeBuddy
        env:
          CODEBUDDY_API_KEY: ${{ secrets.CODEBUDDY_API_KEY }}
          CODEBUDDY_INTERNET_ENVIRONMENT: ${{ secrets.CODEBUDDY_INTERNET_ENVIRONMENT }}
        run: |
          ARGS="-p \"${{ inputs.prompt-text }}\" -y"
          if [ "${{ inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          if [ -n "${{ inputs.output-format }}" ]; then
            ARGS="$ARGS --output-format ${{ inputs.output-format }}"
          fi
          eval "codebuddy $ARGS"

      - name: Collect results
        if: always()
        run: |
          echo "Collecting execution results..."
